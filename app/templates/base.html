<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Overview – Backend &amp; AI{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{% block meta_description %}Luis Seror – Backend &amp; AI freelance. APIs, data flows and AI systems that are simple to operate. FastAPI, Python, LLMs, MCP.{% endblock %}" />
    <meta name="keywords" content="Luis Seror, backend developer, AI developer, freelance, APIs, Python, FastAPI, LLM, MCP, data engineering, software architect" />
    <meta name="author" content="Luis Seror" />
    <link rel="canonical" href="{{ request.url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{% block og_title %}Luis Seror – Backend &amp; AI{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}Luis Seror – Backend &amp; AI freelance. APIs, data flows and AI systems.{% endblock %}" />
    <meta property="og:url" content="{{ request.url }}" />
    <!-- Coloque aqui a URL absoluta da imagem do preview (ex: https://seusite.com/static/img/og-image.jpg). Recomendado: 1200x630 px. -->
    <meta property="og:image" content="{{ url_for('static', filename='img/code.jpg', _external=True) }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{ url_for('static', filename='img/code.jpg', _external=True) }}" />    
    <meta name="twitter:title" content="{% block twitter_title %}Luis Seror – Backend &amp; AI{% endblock %}" />
    <meta name="twitter:description" content="{% block twitter_description %}Backend &amp; AI freelance. APIs, data flows and AI systems.{% endblock %}" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hero.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-container">
        <a href="{{ url_for('hero') }}" class="logo">
          <span>&lt;/&gt;</span> Luis&nbsp;Seror
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <svg
            width="18"
            height="14"
            viewBox="0 0 18 14"
            aria-hidden="true"
          >
            <line
              x1="1"
              y1="2"
              x2="17"
              y2="2"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <line
              x1="1"
              y1="7"
              x2="17"
              y2="7"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <line
              x1="1"
              y1="12"
              x2="17"
              y2="12"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <nav class="navbar">
          <ul>
            <li><a href="{{ url_for('solutions') }}">Solutions I build</a></li>
            <li><a href="{{ url_for('projects') }}">Projects</a></li>
            <li><a href="{{ url_for('about') }}">About me</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer" id="contact">
      <div class="container footer-content">
        <div>
          <h2 class="footer-title">Want to work together?</h2>
          <p class="footer-text">
            Tell me briefly about your team, product and what you’d like help
            with.
          </p>
          <p class="footer-meta">Backend, data and AI work are all welcome.</p>
        </div>
        <form
          id="contact-form"
          class="contact-form"
          action="https://formspree.io/f/meerankb"
          method="POST"
          accept-charset="UTF-8"
        >
          <div class="form-field">
            <label class="form-label" for="name">
              Name
              <span>Required</span>
            </label>
            <input
              class="form-input"
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              required
            />
          </div>
          <div class="form-field">
            <label class="form-label" for="email">
              Email
              <span>Required</span>
            </label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-field full">
            <label class="form-label" for="context">
              Current technical context
              <span>Required</span>
            </label>
            <input
              class="form-input"
              type="text"
              id="context"
              name="context"
              required
              placeholder="Ex: monolith, microservices, mix, main stack…"
            />
          </div>
          <div class="form-field full">
            <label class="form-label" for="message">
              Message
              <span>Optional</span>
            </label>
            <textarea
              class="form-textarea"
              id="message"
              name="message"
            ></textarea>
          </div>
          <div class="form-field full">
            <div class="form-footer">
              <button type="submit" class="btn-primary">Send email</button>
              <div id="form-status" class="form-status"></div>
            </div>
          </div>
        </form>
      </div>
      <div class="footer-bottom">
        ©
        <script>
          document.write(new Date().getFullYear());
        </script>
        Luis Seror. Backend &amp; AI focused portfolio.
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hero.js') }}"></script>
  </body>
</html>
