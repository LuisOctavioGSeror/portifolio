<!DOCTYPE html>
<html lang="{{ current_lang or 'en' }}">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Overview – Backend &amp; AI{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{% block meta_description %}Luis Seror – Backend &amp; AI freelance. APIs, data flows and AI systems that are simple to operate. FastAPI, Python, LLMs, MCP.{% endblock %}" />
    <meta name="keywords" content="Luis Seror, backend developer, AI developer, freelance, APIs, Python, FastAPI, LLM, MCP, data engineering, software architect" />
    <meta name="author" content="Luis Seror" />
    <link rel="canonical" href="{{ request.url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{% block og_title %}Luis Seror – Backend &amp; AI{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}Luis Seror – Backend &amp; AI freelance. APIs, data flows and AI systems.{% endblock %}" />
    <meta property="og:url" content="{{ request.url }}" />
    <!-- Coloque aqui a URL absoluta da imagem do preview (ex: https://seusite.com/static/img/og-image.jpg). Recomendado: 1200x630 px. -->
    <meta property="og:image" content="{{ url_for('static', filename='img/code.jpg', _external=True) }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{ url_for('static', filename='img/code.jpg', _external=True) }}" />    
    <meta name="twitter:title" content="{% block twitter_title %}Luis Seror – Backend &amp; AI{% endblock %}" />
    <meta name="twitter:description" content="{% block twitter_description %}Backend &amp; AI freelance. APIs, data flows and AI systems.{% endblock %}" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v={{ asset_v.main_css }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hero.css') }}?v={{ asset_v.hero_css }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footericons.css') }}?v={{ asset_v.footericons_css }}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-container">
        <a href="{{ url_for('hero') }}" class="logo">
          <span>&lt;/&gt;</span> Luis&nbsp;Seror
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <svg
            width="18"
            height="14"
            viewBox="0 0 18 14"
            aria-hidden="true"
          >
            <line
              x1="1"
              y1="2"
              x2="17"
              y2="2"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <line
              x1="1"
              y1="7"
              x2="17"
              y2="7"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <line
              x1="1"
              y1="12"
              x2="17"
              y2="12"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <nav class="navbar">
          <ul>
            <li><a href="{{ url_for('index') }}"{% if request.endpoint == 'index' %} class="is-active"{% endif %}>{{ _('nav.overview') }}</a></li>
            <li><a href="{{ url_for('solutions') }}">{{ _('nav.solutions') }}</a></li>
            <li><a href="{{ url_for('projects') }}">{{ _('nav.projects') }}</a></li>
            <li><a href="{{ url_for('about') }}">{{ _('nav.about') }}</a></li>
            <li><a href="{{ url_for('contact') }}">{{ _('nav.contact') }}</a></li>
          </ul>
        </nav>
        <div class="lang-switch" aria-label="Language selector">
          <a href="{{ request.path }}?lang=en" class="lang-pill{% if current_lang == 'en' %} is-active{% endif %}">{{ _('nav.lang.en') }}</a>
          <a href="{{ request.path }}?lang=pt" class="lang-pill{% if current_lang == 'pt' %} is-active{% endif %}">{{ _('nav.lang.pt') }}</a>
          <a href="{{ request.path }}?lang=de" class="lang-pill{% if current_lang == 'de' %} is-active{% endif %}">{{ _('nav.lang.de') }}</a>
        </div>
      </div>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      {% include "footer.html" %}
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}?v={{ asset_v.main_js }}"></script>
  </body>
</html>
