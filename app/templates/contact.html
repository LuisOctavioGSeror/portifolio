{% extends "base.html" %}

{% block title %}{{ _('contact.title') }}{% endblock %}

{% block content %}
<div class="contact-layout">

  <!-- Beam cobre todo o fundo da página -->
  <div class="beam-container contact-beam-bg">
    <canvas id="beam-canvas" aria-hidden="true"></canvas>
  </div>

  <!-- Conteúdo sobre o beam -->
  <div class="contact-content">

    <!-- Esquerda: texto sobre o feixe -->
    <div class="contact-left">
      <p class="section-kicker">{{ _('contact.title') }}</p>
      <h1 class="contact-beam-title">{{ _('contact.heading') }}</h1>
      <p class="contact-beam-sub">{{ _('footer.meta') }}</p>
    </div>

    <!-- Direita: card glass com formulário -->
    <div class="contact-right">
      <div class="contact-card">
        <h2 class="contact-card__title">{{ _('footer.title') }}</h2>
        <p class="contact-card__sub">{{ _('footer.text') }}</p>

        <form
          id="contact-form"
          class="contact-form--card"
          action="https://formspree.io/f/meerankb"
          method="POST"
          accept-charset="UTF-8"
        >
          <div class="contact-form-row">
            <div class="form-field">
              <label class="form-label" for="name">
                {{ _('form.name') }} <span>{{ _('form.required') }}</span>
              </label>
              <input class="form-input" type="text" id="name" name="name" autocomplete="name" required />
            </div>
            <div class="form-field">
              <label class="form-label" for="email">
                {{ _('form.email') }} <span>{{ _('form.required') }}</span>
              </label>
              <input class="form-input" type="email" id="email" name="email" autocomplete="email" required />
            </div>
          </div>

          <div class="form-field">
            <label class="form-label" for="phone">
              {{ _('form.phone') }} <span>{{ _('form.optional') }}</span>
            </label>
            <input class="form-input" type="tel" id="phone" name="phone" autocomplete="tel" />
          </div>

          <div class="form-field">
            <label class="form-label" for="context">
              {{ _('form.context') }} <span>{{ _('form.required') }}</span>
            </label>
            <input
              class="form-input"
              type="text"
              id="context"
              name="context"
              required
              placeholder="Ex: monolith, microservices, mix, main stack…"
            />
          </div>

          <div class="form-field">
            <label class="form-label" for="message">
              {{ _('form.message') }} <span>{{ _('form.optional') }}</span>
            </label>
            <textarea class="form-textarea" id="message" name="message" rows="4"></textarea>
          </div>

          <div class="contact-form-actions">
            <button type="submit" class="btn-primary btn-contact-email">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              {{ _('form.submit') }}
            </button>
            <button type="button" class="btn-whatsapp" id="btn-whatsapp">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.526 5.847L.057 23.854c-.07.282.18.532.461.461l6.056-1.469A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.006-1.368l-.36-.214-3.722.976.993-3.63-.234-.373A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
              {{ _('form.submit.whatsapp') }}
            </button>
          </div>

          <div id="form-status" class="form-status" style="margin-top:.5rem;"></div>
        </form>
      </div>
    </div>

  </div>
</div>
<script src="{{ url_for('static', filename='js/beam.js') }}"></script>
{% endblock %}
