{# Isometric social icons — included from base.html inside site-footer #}
<div class="footer-isometric-wrap">
  <ul
    class="footer-isometric-icons"
    role="list"
    aria-label="{{ _('footer.social_aria') }}"
  >
    <li>
      <a
        href="{{ social_linkedin }}"
        {% if social_linkedin != "#" %}target="_blank" rel="noopener noreferrer"{% endif %}
        aria-label="LinkedIn"
      >
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span><i class="fa-brands fa-linkedin-in" aria-hidden="true"></i></span>
      </a>
    </li>
    <li>
      <a
        href="{{ social_youtube }}"
        {% if social_youtube != "#" %}target="_blank" rel="noopener noreferrer"{% endif %}
        aria-label="YouTube"
      >
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span><i class="fa-brands fa-youtube" aria-hidden="true"></i></span>
      </a>
    </li>
    <li>
      <a
        href="{{ social_github }}"
        {% if social_github != "#" %}target="_blank" rel="noopener noreferrer"{% endif %}
        aria-label="GitHub"
      >
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span><i class="fa-brands fa-github" aria-hidden="true"></i></span>
      </a>
    </li>
  </ul>
</div>
