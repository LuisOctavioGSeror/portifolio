<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feixe de Luz — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    #beam-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .demo-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .demo-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 200, 50, 0.25);
      background: rgba(255, 180, 30, 0.08);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 220, 100, 0.85);
    }

    .demo-tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #FFD060;
      box-shadow: 0 0 6px 2px rgba(255,200,60,0.7);
      animation: dot-pulse 2s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(160deg, #fff 30%, #FFD060 70%, #FF8C00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      max-width: 42ch;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
    }

    .btn {
      margin-top: 0.5rem;
      padding: 0.75rem 2.25rem;
      border-radius: 999px;
      border: 1px solid rgba(255,200,60,0.35);
      background: linear-gradient(to bottom, rgba(255,200,60,0.18), rgba(255,120,0,0.12));
      color: #FFD060;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.04em;
    }

    .btn:hover {
      background: linear-gradient(to bottom, rgba(255,200,60,0.3), rgba(255,120,0,0.2));
      border-color: rgba(255,200,60,0.6);
      box-shadow: 0 0 30px -5px rgba(255,180,40,0.35);
    }
  </style>
</head>
<body>

<canvas id="beam-canvas"></canvas>

<div class="demo-content">
  <span class="demo-tag">Feixe de luz pulsante</span>
  <h1>Luz que<br>respira</h1>
  <p>Efeito criado com Canvas puro — sem bibliotecas externas, sem imagens.</p>
  <button class="btn">Explorar portfólio</button>
</div>

<script>
(function () {
  const canvas = document.getElementById('beam-canvas');
  const ctx    = canvas.getContext('2d');

  let W, H, time = 0;
  let sparks = [], embers = [];
  let tA = 0, tB = 0, tC = 0, tD = 0;

  /* ── Detecção de dispositivo + qualidade adaptativa ── */
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i
                    .test(navigator.userAgent) || window.innerWidth < 768;

  const CFG = isMobile ? {
    STEPS      : 45,    // pontos do path do feixe
    MAX_SPARKS : 80,    // streaks
    MAX_EMBERS : 60,    // pontinhos
    LAYER_START: 3,     // pula as 3 camadas mais largas (caras e quase invisíveis)
    FPS_LIMIT  : 30,    // trava em 30fps no mobile
  } : {
    STEPS      : 75,
    MAX_SPARKS : 180,
    MAX_EMBERS : 120,
    LAYER_START: 0,     // todas as 10 camadas no desktop
    FPS_LIMIT  : 60,
  };

  const FRAME_MIN_MS = 1000 / CFG.FPS_LIMIT;
  let   lastFrameTs  = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  // Arrays pré-alocados — tamanho baseado no CFG
  const STEPS = CFG.STEPS;
  const pathX = new Float32Array(STEPS + 1);
  const pathY = new Float32Array(STEPS + 1);

  function beamX(y) {
    const t   = y / H;
    const amp = W * 0.022 * (t ** 0.55);
    return W / 2 + amp * (
      Math.sin(t * 5.2  + tA) * 0.40 +
      Math.sin(t * 2.4  - tB) * 0.28 +
      Math.sin(t * 10.1 + tC) * 0.18 +
      Math.sin(t * 1.7  - tD) * 0.14
    );
  }

  /* ── SPARKS ── */
  function makeSpark() {
    return {
      y      : H * (0.35 + Math.random() * 0.65),
      speed  : 2.5 + Math.random() * 5.5,
      length : 6   + Math.random() * 28,
      spread : (Math.random() - 0.5) * W * 0.025,
      alpha  : 0.65 + Math.random() * 0.35,
      width  : 0.5  + Math.random() * 1.1,
    };
  }

  function initSparks() {
    sparks = [];
    const n = Math.min(CFG.MAX_SPARKS, Math.floor(W * H / 6000));
    for (let i = 0; i < n; i++) { const s = makeSpark(); s.y = Math.random() * H; sparks.push(s); }
  }

  function updateSparks() {
    for (let i = 0; i < sparks.length; i++) {
      sparks[i].y -= sparks[i].speed;
      if (sparks[i].y + sparks[i].length < 0) sparks[i] = makeSpark();
    }
  }

  function drawSparks() {
    const pulse = 0.8 + 0.2 * Math.sin(time * 1.1);
    // Estado definido uma vez fora do loop — sem save/restore, sem shadowBlur
    ctx.lineCap    = 'round';
    ctx.shadowBlur = 0;
    for (let i = 0; i < sparks.length; i++) {
      const s  = sparks[i];
      const px = beamX(s.y) + s.spread;
      const a  = s.alpha * pulse;
      ctx.lineWidth   = s.width;
      ctx.strokeStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.beginPath();
      ctx.moveTo(px, s.y + s.length * 0.5);
      ctx.lineTo(px, s.y - s.length * 0.5);
      ctx.stroke();
    }
  }

  /* ── EMBERS ── */
  function makeEmber() {
    const t = Math.random();
    return {
      x    : W/2 + (Math.random() - 0.5) * W * 0.60 * t,
      y    : H * t,
      vy   : -(0.06 + Math.random() * 0.18),
      vx   : (Math.random() - 0.5) * 0.08,
      size : 0.5 + Math.random() * 1.8,
      life : Math.random(),
      maxL : 0.4 + Math.random() * 0.6,
      alpha: 0,
    };
  }

  function initEmbers() {
    embers = [];
    const n = Math.min(CFG.MAX_EMBERS, Math.floor(W * H / 8000));
    for (let i = 0; i < n; i++) { const e = makeEmber(); e.life = Math.random() * e.maxL; embers.push(e); }
  }

  function updateEmbers() {
    for (let i = 0; i < embers.length; i++) {
      const e = embers[i];
      e.x += e.vx; e.y += e.vy; e.life += 0.003;
      const r = e.life / e.maxL;
      e.alpha = r < 0.2 ? r / 0.2 : r > 0.75 ? (1 - r) / 0.25 : 1;
      if (e.life >= e.maxL || e.y < 0) embers[i] = makeEmber();
    }
  }

  function drawEmbers() {
    const gp = 0.75 + 0.25 * Math.sin(time * 0.7);
    ctx.shadowBlur = 0;  // garantir sem shadow
    for (let i = 0; i < embers.length; i++) {
      const e = embers[i];
      const a = e.alpha * 0.82 * gp;
      if (a < 0.02) continue;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,220,230,${a.toFixed(2)})`;
      ctx.fill();
    }
  }

  /* ── BEAM ── */
  function drawBeam() {
    const pulse = 0.88 + 0.12 * Math.sin(time * 1.15);

    // Preenche arrays pré-alocados — zero alocação de memória
    for (let i = 0; i <= STEPS; i++) {
      pathY[i] = H * i / STEPS;
      pathX[i] = beamX(pathY[i]);
    }

    const drawPath = () => {
      ctx.beginPath();
      ctx.moveTo(pathX[0], pathY[0]);
      for (let i = 1; i <= STEPS; i++) ctx.lineTo(pathX[i], pathY[i]);
    };

    // Glows — stops reduzidos de 5 para 3
    const bg = ctx.createRadialGradient(W/2, H, 0, W/2, H, W * 0.60);
    bg.addColorStop(0.00, `rgba(200,200,210,${(0.40*pulse).toFixed(3)})`);
    bg.addColorStop(0.40, `rgba(110,110,120,${(0.06*pulse).toFixed(3)})`);
    bg.addColorStop(1.00, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const mg = ctx.createRadialGradient(W/2, H*0.6, 0, W/2, H*0.6, W * 0.35);
    mg.addColorStop(0.00, `rgba(170,170,180,${(0.10*pulse).toFixed(3)})`);
    mg.addColorStop(1.00, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg;
    ctx.fillRect(0, 0, W, H);

    // Camadas do feixe — sem shadowBlur, sem save/restore
    // Duas camadas extras compensam o glow que o shadowBlur dava
    ctx.lineCap    = 'round';
    ctx.lineJoin   = 'round';
    ctx.shadowBlur = 0;
    const p = pulse;
    const layers = [
      [W*0.220, `rgba(130,130,140,${(0.030*p).toFixed(3)})`],
      [W*0.130, `rgba(160,160,170,${(0.050*p).toFixed(3)})`],
      [W*0.075, `rgba(190,190,200,${(0.085*p).toFixed(3)})`],
      [W*0.040, `rgba(215,215,220,${(0.130*p).toFixed(3)})`],
      [W*0.026, `rgba(228,228,235,${(0.170*p).toFixed(3)})`],  // extra (compensa shadow)
      [W*0.016, `rgba(238,238,244,${(0.250*p).toFixed(3)})`],  // extra (compensa shadow)
      [W*0.009, `rgba(245,245,248,${(0.370*p).toFixed(3)})`],
      [W*0.004, `rgba(255,255,255,${(0.600*p).toFixed(3)})`],
      [3.5,     `rgba(255,255,255,${(0.860*p).toFixed(3)})`],
      [1.5,     'rgba(255,255,255,1)'],
    ];
    for (let i = CFG.LAYER_START; i < layers.length; i++) {
      ctx.lineWidth   = layers[i][0];
      ctx.strokeStyle = layers[i][1];
      drawPath();
      ctx.stroke();
    }

    // Fades
    const ft = ctx.createLinearGradient(0, 0, 0, H * 0.30);
    ft.addColorStop(0.0, 'rgba(5,5,5,0.92)');
    ft.addColorStop(1.0, 'rgba(5,5,5,0)');
    ctx.fillStyle = ft;
    ctx.fillRect(0, 0, W, H * 0.30);

    const fb = ctx.createLinearGradient(0, H * 0.80, 0, H);
    fb.addColorStop(0.0, 'rgba(5,5,5,0)');
    fb.addColorStop(1.0, 'rgba(5,5,5,0.75)');
    ctx.fillStyle = fb;
    ctx.fillRect(0, H * 0.80, W, H * 0.20);
  }

  /* ── LOOP ── */
  function frame(timestamp) {
    requestAnimationFrame(frame);

    // Limita FPS no mobile (30fps) — desktop roda livre (60fps)
    if (timestamp - lastFrameTs < FRAME_MIN_MS) return;
    lastFrameTs = timestamp;

    time += isMobile ? 0.032 : 0.016; // passo de tempo dobrado no mobile (compensa 30fps)
    tA = time * 1.50; tB = time * 0.80;
    tC = time * 2.30; tD = time * 0.40;

    ctx.clearRect(0, 0, W, H);
    drawBeam();
    updateSparks(); drawSparks();
    updateEmbers(); drawEmbers();
  }

  window.addEventListener('resize', () => { resize(); initSparks(); initEmbers(); });
  resize();
  initSparks();
  initEmbers();
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
